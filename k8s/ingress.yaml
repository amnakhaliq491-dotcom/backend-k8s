apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: backend-ingress
  namespace: backend-prod
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/rewrite-target: /$2          # strips /api prefix before forwarding
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"       # allow image uploads
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - 35.254.180.4.nip.io     
      secretName: backend-tls-cert  # cert-manager will create/renew this
  rules:
    - host: api.yourdomain.com      # ← same domain
      http:
        paths:
          - path: /api(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: backend-api-svc
                port:
                  number: 80
