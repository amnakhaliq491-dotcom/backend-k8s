# ── Kubernetes Service Account (bound to GSA via Workload Identity) ────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backend-ksa
  namespace: backend-prod
  annotations:
    iam.gke.io/gcp-service-account: "backend-gsa@dev-test-498808.iam.gserviceaccount.com"

---
# ── Deployment ──────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-api
  namespace: backend-prod
  labels:
    app: backend-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend-api
  template:
    metadata:
      labels:
        app: backend-api
    spec:
      serviceAccountName: backend-ksa   # uses Workload Identity → GSA
      initContainers:
        # Fetch secrets from Secret Manager and write to /vault/secrets/
        - name: fetch-secrets
          image: google/cloud-sdk:slim
          command:
            - /bin/bash
            - -c
            - |
              gcloud secrets versions access latest \
                --secret=MONGO_URI \
                --project=dev-test-498808\
                > /vault/secrets/MONGO_URI
          volumeMounts:
            - name: secrets-vol
              mountPath: /vault/secrets
      containers:
        - name: backend-api
          image: REGION-docker.pkg.dev/dev-test-498808/backend-repo/backend-api:latest
          ports:
            - containerPort: 3000
          env:
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: MONGO_URI
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 15
      volumes:
        - name: secrets-vol
          emptyDir: {}

---
# ── Service ─────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: backend-api-svc
  namespace: backend-prod
spec:
  selector:
    app: backend-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: ClusterIP
